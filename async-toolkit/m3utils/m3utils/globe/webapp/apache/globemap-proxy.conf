# Apache reverse-proxy configuration for globe map webapp
#
# Run gunicorn behind Apache:
#   cd /opt/globemap/webapp
#   gunicorn -w 4 -b 127.0.0.1:8000 wsgi:application
#
# Prerequisites:
#   a2enmod proxy proxy_http   # Debian/Ubuntu
#
# Enable: a2ensite globemap-proxy
# Adjust ServerName and paths as needed.

<VirtualHost *:80>
    ServerName globemap.example.com

    # Path to the webapp directory
    Define WEBAPP_DIR /opt/globemap/webapp

    # Serve static files directly (bypass gunicorn)
    Alias /static ${WEBAPP_DIR}/static
    <Directory ${WEBAPP_DIR}/static>
        Require all granted
        Options -Indexes
    </Directory>

    # Proxy everything else to gunicorn
    ProxyPreserveHost On
    ProxyPass /static !
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    ErrorLog ${APACHE_LOG_DIR}/globemap-error.log
    CustomLog ${APACHE_LOG_DIR}/globemap-access.log combined
</VirtualHost>

# Apache mod_wsgi configuration for globe map webapp
#
# Prerequisites:
#   apt install libapache2-mod-wsgi-py3   # Debian/Ubuntu
#   pkg install ap24-mod_wsgi             # FreeBSD
#
# Enable: a2ensite globemap
# Adjust paths, user, and ServerName as needed.

<VirtualHost *:80>
    ServerName globemap.example.com

    # Path to the webapp directory
    Define WEBAPP_DIR /opt/globemap/webapp

    # Python virtualenv
    WSGIDaemonProcess globemap \
        python-home=${WEBAPP_DIR}/venv \
        python-path=${WEBAPP_DIR} \
        processes=2 threads=4

    WSGIProcessGroup globemap
    WSGIScriptAlias / ${WEBAPP_DIR}/wsgi.py

    # Set globetool binary location
    SetEnv GLOBETOOL_BIN /opt/globemap/globetool/AMD64_LINUX/globetool

    # Serve static files directly
    Alias /static ${WEBAPP_DIR}/static
    <Directory ${WEBAPP_DIR}/static>
        Require all granted
        Options -Indexes
    </Directory>

    <Directory ${WEBAPP_DIR}>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/globemap-error.log
    CustomLog ${APACHE_LOG_DIR}/globemap-access.log combined
</VirtualHost>
